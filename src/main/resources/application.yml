spring:
  application:
    name: stockflow-erp-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stockflow}
    username: ${SPRING_DATASOURCE_USERNAME:stockflow}
    password: ${SPRING_DATASOURCE_PASSWORD:stockflow}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

stockflow:
  security:
    jwt:
      secret: ${STOCKFLOW_JWT_SECRET:}
      issuer: ${STOCKFLOW_JWT_ISSUER:stockflow-erp-api}
      ttl: ${STOCKFLOW_JWT_TTL:PT8H}
    bootstrap-admin:
      name: ${STOCKFLOW_ADMIN_NAME:StockFlow Admin}
      email: ${STOCKFLOW_ADMIN_EMAIL:}
      password: ${STOCKFLOW_ADMIN_PASSWORD:}

services:
  app:
    build: .
    container_name: stockflow-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-stockflow}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-stockflow}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-stockflow}
    ports:
      - "${APP_PORT:-8080}:8080"

  db:
    image: postgres:16-alpine
    container_name: stockflow-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stockflow}
      POSTGRES_USER: ${POSTGRES_USER:-stockflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - stockflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockflow} -d ${POSTGRES_DB:-stockflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: stockflow-pgadmin
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@stockflow.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - db

volumes:
  stockflow-postgres-data:
